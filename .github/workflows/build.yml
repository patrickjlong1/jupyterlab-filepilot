name: Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install build jupyterlab hatch-jupyter-builder

      - name: Install JS dependencies
        run: jlpm install
        working-directory: .

      - name: Build extension
        run: python -m build
        env:
          HATCH_BUILD_HOOKS_ENABLE: "true"

      - name: Check dist artifacts
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
